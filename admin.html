<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IMO Diamond Recharge - Admin Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --secondary: #ec4899;
        --accent: #f59e0b;
        --success: #10b981;
        --danger: #ef4444;
        --bg: #ffffff;
        --surface: #f8fafc;
        --surface-light: #f1f5f9;
        --text: #1e293b;
        --text-muted: #64748b;
        --gradient-1: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        --gradient-2: linear-gradient(135deg, #f59e0b 0%, #ec4899 100%);
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      .bg-animation {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
      }

      .bg-animation::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
          radial-gradient(
            circle at 80% 20%,
            rgba(236, 72, 153, 0.1) 0%,
            transparent 40%
          );
        animation: rotate 30s linear infinite;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      header {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      nav {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 1.5rem;
        font-weight: 800;
        background: var(--gradient-1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .logo-icon {
        width: 40px;
        height: 40px;
        background: var(--gradient-1);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
        -webkit-text-fill-color: white;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      }

      .admin-logout {
        display: none;
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
        border: 1px solid rgba(239, 68, 68, 0.3);
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .admin-logout:hover {
        background: var(--danger);
        color: white;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }

      /* View Switching */
      #loginView,
      #dashboardView {
        display: none;
        animation: fadeIn 0.4s ease forwards;
      }

      #loginView.active,
      #dashboardView.active {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Login Card */
      .login-card {
        max-width: 400px;
        margin: 2rem auto;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 24px;
        padding: 2.5rem 2rem;
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .login-header h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .login-header p {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 2rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
        text-align: left;
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
        font-size: 0.875rem;
        font-weight: 500;
      }

      .form-input {
        width: 100%;
        padding: 1rem;
        background: var(--bg);
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 12px;
        color: var(--text);
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      }

      .btn {
        width: 100%;
        padding: 1rem;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-primary {
        background: var(--gradient-1);
        color: white;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
      }

      .btn-primary:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
      }

      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .error-msg {
        color: var(--danger);
        font-size: 0.85rem;
        margin-top: 1rem;
        min-height: 1.2rem;
      }

      /* Dashboard */
      .dashboard-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }

      .dashboard-header h1 {
        font-size: 1.8rem;
        font-weight: 700;
        white-space: nowrap;
      }

      .dashboard-actions {
        display: flex;
        gap: 1rem;
      }

      .btn-fetch {
        background: var(--surface-light);
        border: 1px solid rgba(0, 0, 0, 0.1);
        color: var(--primary);
        padding: 0.6rem 1.2rem;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-fetch:hover {
        background: var(--primary);
        color: white;
      }

      .orders-table-wrapper {
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 16px;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 1rem 1.5rem;
        text-align: left;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }

      th {
        background: var(--surface-light);
        color: var(--text-muted);
        font-weight: 600;
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      /* Order Cards */
      .orders-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .order-card {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 12px;
        padding: 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px -5px rgba(0, 0, 0, 0.2);
      }

      .order-card:hover {
        border-color: rgba(99, 102, 241, 0.3);
        transform: translateY(-4px);
        box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.4);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding-bottom: 0.4rem;
      }

      .card-title h4 {
        font-family: monospace;
        font-size: 0.85rem;
        letter-spacing: 0.2px;
        color: var(--primary);
      }

      .card-date {
        font-size: 0.6rem;
        color: var(--text-muted);
      }

      .card-body {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      .detail-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .detail-val {
        color: var(--text);
        font-weight: 500;
      }

      .price-badge {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text);
        text-align: right;
        margin-top: 0.1rem;
      }

      .card-footer {
        display: flex;
        gap: 0.3rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 0.6rem;
        margin-top: auto;
      }

      .order-status {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        border-radius: 12px;
        font-size: 0.65rem;
        font-weight: 600;
        text-transform: uppercase;
      }

      .status-pending {
        background: rgba(245, 158, 11, 0.1);
        color: var(--accent);
      }

      .status-success {
        background: rgba(16, 185, 129, 0.1);
        color: var(--success);
      }

      .status-failed {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
      }

      .skeleton-loader {
        height: 20px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.05) 25%,
          rgba(255, 255, 255, 0.1) 37%,
          rgba(255, 255, 255, 0.05) 63%
        );
        background-size: 400% 100%;
        animation: skeleton-loading 1.4s ease infinite;
        border-radius: 4px;
      }

      @keyframes skeleton-loading {
        0% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0 50%;
        }
      }

      .empty-state {
        text-align: center;
        padding: 3rem;
        color: var(--text-muted);
      }

      /* Pagination */
      .pagination-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.8rem;
        margin-top: 2rem;
        padding: 1.5rem 1rem;
        background: var(--surface-light);
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.05);
      }

      .page-btn {
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.1);
        color: var(--text-muted);
        padding: 0.6rem 1rem;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 0.9rem;
        font-weight: 600;
        min-width: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .page-btn.active {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      }

      .page-btn:hover:not(.active):not(:disabled) {
        background: var(--surface-light);
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .page-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .page-info {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin: 0 1rem;
      }

      /* Robust Header Styling */
      .admin-search-box {
        display: flex;
        align-items: center;
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        overflow: hidden;
        transition: all 0.3s;
      }
      .admin-search-box:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      }
      #adminSearch {
        background: transparent;
        border: none;
        padding: 0.6rem 1rem;
        color: var(--text);
        width: 200px;
        font-size: 0.9rem;
        outline: none;
      }
      .btn-icon {
        background: var(--surface-light);
        border: none;
        border-left: 1px solid rgba(0, 0, 0, 0.05);
        padding: 0.6rem 0.8rem;
        color: var(--primary);
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-icon:hover {
        background: var(--primary);
        color: white;
      }

      @media (max-width: 600px) {
        .dashboard-header {
          flex-direction: row !important;
          flex-wrap: nowrap !important;
          justify-content: space-between !important;
          gap: 0.5rem;
          margin-bottom: 1.5rem;
        }
        .dashboard-title-group h1 {
          font-size: 1.1rem !important;
          margin: 0;
          white-space: nowrap;
        }
        .dashboard-title-group p {
          display: none !important;
        }
        .admin-search-box {
          flex: 1;
          max-width: 180px;
        }
        #adminSearch {
          width: 100%;
          padding: 0.4rem 0.75rem;
          font-size: 0.8rem;
        }
        .btn-icon {
          padding: 0.4rem 0.6rem;
        }
        .hide-mobile {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-animation"></div>

    <header>
      <nav>
        <div class="logo">
          <div class="logo-icon">💎</div>
          IMO Admin
        </div>
        <button class="admin-logout" id="logoutBtn" onclick="handleLogout()">
          Logout
        </button>
      </nav>
    </header>

    <div class="container">
      <!-- Login View -->
      <div id="loginView" class="active">
        <div class="login-card">
          <div class="login-header">
            <h2>Admin Login</h2>
            <p>Access the order management dashboard</p>
          </div>
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label class="form-label">Username</label>
              <input
                type="text"
                class="form-input"
                id="username"
                placeholder="admin"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input
                type="password"
                class="form-input"
                id="password"
                placeholder="••••••••"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary" id="loginBtn">
              Secure Login
            </button>
            <div class="error-msg" id="loginError"></div>
          </form>
        </div>
      </div>

      <div id="dashboardView">
        <div class="dashboard-header">
          <div class="dashboard-title-group">
            <h1>Orders</h1>
            <p>Manage and verify recharges</p>
          </div>
          <div class="dashboard-actions">
            <div class="admin-search-box">
              <input
                type="text"
                id="adminSearch"
                placeholder="Search orders..."
                onkeyup="filterAdminOrders()"
              />
              <button class="btn-icon" onclick="fetchOrders()">🔄</button>
            </div>
            <button class="btn-fetch hide-mobile" onclick="fetchOrders()">
              Refresh
            </button>
          </div>
        </div>

        <div id="ordersContainer" class="orders-grid">
          <!-- Order cards will be injected here -->
        </div>

        <div class="pagination-container" id="pagination">
          <!-- Pagination buttons will be injected here -->
        </div>
      </div>
    </div>

    <script>
      // API Configuration - Replace with your actual endpoints
      const API_CONFIG = {
        loginEndpoint: "https://jsonplaceholder.typicode.com/posts", // Dummy endpoint
        ordersEndpoint: "https://jsonplaceholder.typicode.com/users", // Dummy endpoint
      };

      // State Management
      let authToken = localStorage.getItem("adminToken");
      let allOrders = [];
      let currentPage = 1;
      const itemsPerPage = 8;

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        if (authToken) {
          showDashboard();
        } else {
          showLogin();
        }
      });

      // Show/Hide Views
      function showLogin() {
        document.getElementById("dashboardView").classList.remove("active");
        document.getElementById("loginView").classList.add("active");
        document.getElementById("logoutBtn").style.display = "none";
      }

      function showDashboard() {
        document.getElementById("loginView").classList.remove("active");
        document.getElementById("dashboardView").classList.add("active");
        document.getElementById("logoutBtn").style.display = "block";
        fetchOrders();
      }

      // Handle Login
      async function handleLogin(e) {
        e.preventDefault();
        const usernameInput = document.getElementById("username").value;
        const passwordInput = document.getElementById("password").value;
        const loginBtn = document.getElementById("loginBtn");
        const errorMsg = document.getElementById("loginError");

        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";
        errorMsg.textContent = "";

        try {
          // --- Mock API Login implementation ---
          // Replace this block with your actual login API request:
          /*
          const response = await fetch(API_CONFIG.loginEndpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: usernameInput, password: passwordInput })
          });
          const data = await response.json();
          */

          // Simulating network delay and login check for mockup
          await new Promise((resolve) => setTimeout(resolve, 800));

          if (usernameInput === "admin" && passwordInput === "admin") {
            // Mock token
            const token = "mock-jwt-token-xyz-123";
            localStorage.setItem("adminToken", token);
            authToken = token;
            showDashboard();
          } else {
            errorMsg.textContent =
              "Invalid username or password. (Hint: Use admin/admin)";
          }
        } catch (error) {
          console.error("Login failed:", error);
          errorMsg.textContent =
            "An error occurred during login. Please try again.";
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = "Secure Login";
        }
      }

      // Handle Logout
      function handleLogout() {
        localStorage.removeItem("adminToken");
        authToken = null;
        document.getElementById("loginForm").reset();
        document.getElementById("loginError").textContent = "";
        showLogin();
      }

      // Fetch Orders
      async function fetchOrders() {
        const container = document.getElementById("ordersContainer");

        // Show loading state
        let skeletons = "";
        for (let i = 0; i < 4; i++) {
          skeletons += `
            <div class="order-card" style="opacity: 0.4;">
              <div class="skeleton-loader" style="width: 60%; margin-bottom: 1rem;"></div>
              <div class="skeleton-loader" style="height: 100px;"></div>
            </div>
          `;
        }
        container.innerHTML = skeletons;

        try {
          // --- Mock API Fetch implementation ---
          // Replace this block with your actual fetch API request:
          /*
          const response = await fetch(API_CONFIG.ordersEndpoint, {
            method: "GET",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${authToken}`
            }
          });
          const orders = await response.json();
          */

          // Simulating network delay and mock data
          await new Promise((resolve) => setTimeout(resolve, 1000));

          // Generate 25 mock orders for pagination demo
          const mockOrders = [];
          const statuses = ["success", "pending", "failed"];

          for (let i = 0; i < 25; i++) {
            mockOrders.push({
              id: `ORD${1000 + i}${String.fromCharCode(65 + (i % 26))}`,
              userId: i % 4 === 0 ? `killer_x` : `user_${500 + i}`,

              diamonds: [100, 310, 1060, 2200, 5600][i % 5],
              amount: [50, 150, 500, 1000, 2500][i % 5],
              status: statuses[i % 3],
              upiApp: ["GPay", "PhonePe", "Paytm", "UPI App"][i % 4],
              date: new Date(Date.now() - i * 3600000 * 2).toISOString(),
            });
          }

          allOrders = mockOrders;
          // Apply search filter if query exists
          const query = document
            .getElementById("adminSearch")
            ?.value.trim()
            .toLowerCase();
          const filtered = query
            ? allOrders.filter(
                (o) =>
                  o.id.toLowerCase().includes(query) ||
                  o.userId.toLowerCase().includes(query),
              )
            : allOrders;

          displayCurrentPage(filtered);
        } catch (error) {
          console.error("Failed to fetch orders:", error);
          container.innerHTML = `
            <div class="empty-state" style="grid-column: 1/-1;">
              <span style="color: var(--danger)">⚠️ Error loading orders. Please try again later.</span>
            </div>
          `;
        }
      }

      function displayCurrentPage(orders) {
        const totalItems = orders.length;
        const totalPages = Math.ceil(totalItems / itemsPerPage);

        // Ensure currentPage is within bounds
        if (currentPage > totalPages) currentPage = Math.max(1, totalPages);

        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = orders.slice(start, end);

        renderOrders(pageItems);
        renderPaginationUI(totalItems, totalPages);
      }

      function renderPaginationUI(totalItems, totalPages) {
        const container = document.getElementById("pagination");

        // Show even if only one page exists (as a separator/footer)
        // Set totalPages to 1 if no items
        const safeTotal = Math.max(1, totalPages);

        let html = `
          <button class="page-btn" ${currentPage <= 1 ? "disabled" : ""} onclick="changePage(${currentPage - 1})">←</button>
          <span class="page-info" style="font-weight: 700; color: var(--text);">Page ${currentPage} of ${safeTotal}</span>
          <button class="page-btn" ${currentPage >= safeTotal ? "disabled" : ""} onclick="changePage(${currentPage + 1})">→</button>
        `;

        container.innerHTML = html;
        container.style.display = totalItems > 0 ? "flex" : "none";
      }

      function changePage(newPage) {
        currentPage = newPage;
        // Re-fetch or re-filter
        fetchOrders(); // Simplest is to just call fetch again which handles slicing
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // Filter Admin Orders (Integrated with Pagination)
      function filterAdminOrders() {
        currentPage = 1;
        fetchOrders();
      }

      // Render Orders to Card Grid
      function renderOrders(orders) {
        const container = document.getElementById("ordersContainer");

        if (!orders || orders.length === 0) {
          container.innerHTML = `
            <div class="empty-state" style="grid-column: 1/-1;">
              No orders found matching your search.
            </div>
          `;
          return;
        }

        const html = orders
          .map((order) => {
            let statusClass = "status-pending";
            if (order.status === "success") statusClass = "status-success";
            if (order.status === "failed") statusClass = "status-failed";

            const dateObj = new Date(order.date);
            const formattedDate =
              dateObj.toLocaleDateString() +
              " " +
              dateObj.toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit",
              });

            return `
            <div class="order-card">
              <div class="card-header">
                <div class="card-title">
                  <h4>#${order.id}</h4>
                  <div class="card-date">${formattedDate}</div>
                </div>
                <span class="order-status ${statusClass}">${order.status}</span>
              </div>
              
              <div class="card-body">
                <div class="detail-row">
                  <span>User ID</span>
                  <span class="detail-val">${order.userId}</span>
                </div>
                <div class="detail-row">
                  <span>Diamonds</span>
                  <span class="detail-val"><span style="color: var(--accent)">💎</span> ${order.diamonds.toLocaleString()}</span>
                </div>
                <div class="price-badge">
                  ₹${order.amount.toLocaleString()}
                </div>
              </div>

              <div class="card-footer" style="flex-wrap: wrap;">
                ${
                  order.status === "pending"
                    ? `
                  <button class="btn" style="background: var(--success); color: white; padding: 0.35rem 0.6rem; font-size: 0.75rem; flex: 1;" onclick="updateStatus('${order.id}', 'success')">Approve</button>
                  <button class="btn" style="background: var(--accent); color: white; padding: 0.35rem 0.6rem; font-size: 0.75rem; flex: 1;" onclick="updateStatus('${order.id}', 'failed')">Reject</button>
                `
                    : ""
                }
                <button class="btn" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 0.35rem 0.6rem; font-size: 0.75rem; flex: 1;" onclick="deleteOrder('${order.id}')">Delete</button>
              </div>
            </div>
          `;
          })
          .join("");

        container.innerHTML = html;
      }

      // Filter Admin Orders (Integrated with Pagination)
      function filterAdminOrders() {
        currentPage = 1; // Reset to first page on search
        fetchOrders();
      }

      async function updateStatus(id, status) {
        console.log(`Updating order ${id} to ${status}`);
        // In real app: await fetch(`${API_CONFIG.ordersEndpoint}/${id}`, { method: 'PATCH', body: JSON.stringify({status}) });

        // Mock feedback
        const btn = event.target;
        btn.disabled = true;
        btn.textContent = "...";

        setTimeout(() => {
          alert(`Order #${id} has been marked as ${status.toUpperCase()}`);
          fetchOrders(); // Refresh list to show change
        }, 800);
      }

      async function deleteOrder(id) {
        if (
          !confirm(
            `Permanently delete order #${id}? This action cannot be undone.`,
          )
        )
          return;

        console.log(`Deleting order ${id}`);
        // In real app: await fetch(`${API_CONFIG.ordersEndpoint}/${id}`, { method: 'DELETE' });

        alert(`Order #${id} has been deleted.`);
        fetchOrders();
      }
    </script>
  </body>
</html>
